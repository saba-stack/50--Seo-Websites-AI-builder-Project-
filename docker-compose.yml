version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alyson-api
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/alyson
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: replace_with_access_secret
      JWT_REFRESH_SECRET: replace_with_refresh_secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      CORS_ORIGIN: http://localhost:3000
      ENCRYPTION_KEY: 32_characters_minimum_length_key!
      WORKER_ENABLED: "true"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: alyson-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alyson
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: alyson-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
